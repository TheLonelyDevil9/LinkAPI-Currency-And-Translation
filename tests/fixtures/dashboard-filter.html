<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LinkAPI Dashboard Removed Helpers Fixture</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #f4f4f5;
      font: 14px/1.4 system-ui, sans-serif;
    }

    main {
      padding: 24px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 12px 0;
    }

    input,
    button {
      min-height: 30px;
      border: 1px solid #52525b;
      border-radius: 6px;
      background: #27272a;
      color: #fafafa;
      padding: 0 10px;
    }
  </style>
</head>
<body>
  <aside aria-label="Primary navigation">
    <a href="/dashboard/models">Dashboard</a>
    <a href="/usage-logs/common">Usage Logs</a>
  </aside>
  <main>
    <h1>Dashboard</h1>
    <section aria-label="Model analytics">
      <header class="row">
        <div>Model Call Analytics</div>
        <span>Total: 24,866</span>
      </header>
      <div class="row">Call Count Distribution <button>Trend</button><button>Proportion</button><button>Top</button></div>
      <div class="row">Call Trend</div>
      <div class="row">Call Count Ranking</div>
    </section>
    <section role="dialog" aria-label="Filter Dashboard Models">
      <h2>Filter Dashboard Models</h2>
      <div class="row">
        <button>1 Day</button>
        <button>7 Days</button>
        <button>14 Days</button>
        <button>29 Days</button>
      </div>
      <div class="row">
        <label>Start Time <input id="dashboard-start" aria-label="Dashboard Start Time" value="2026-04-10 11:47:00"></label>
      </div>
      <div class="row">Time Granularity <button>Day</button></div>
    </section>
  </main>

  <script>
    history.replaceState({}, '', '/dashboard/models');
  </script>
</body>
</html>
