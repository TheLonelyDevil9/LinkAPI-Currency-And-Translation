<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LinkAPI New UI Smoke Fixture</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #f4f4f5;
      font: 14px/1.4 system-ui, sans-serif;
    }

    main {
      padding: 24px;
    }

    .compact-grid,
    .row,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 12px 0;
    }

    .compact-grid {
      width: 520px;
      padding: 10px;
      border: 1px solid #3f3f46;
    }

    input,
    button,
    select {
      min-height: 30px;
      border: 1px solid #52525b;
      border-radius: 6px;
      background: #27272a;
      color: #fafafa;
      padding: 0 10px;
    }

    table {
      border-collapse: collapse;
      margin-top: 16px;
      min-width: 520px;
    }

    th,
    td {
      border: 1px solid #3f3f46;
      padding: 8px 12px;
      text-align: left;
    }

    .popover {
      position: absolute;
      z-index: 20;
      display: none;
      flex-direction: column;
      gap: 4px;
      padding: 8px;
      border: 1px solid #52525b;
      background: #18181b;
    }

    .popover[data-open="true"] {
      display: flex;
    }
  </style>
</head>
<body>
  <main data-page="usage">
    <h1>Usage Logs</h1>
    <p>Used quota RPM TPM Time/Request Request ID Tokens Consume Group Type Model</p>

    <div class="actions" id="log-actions">
      <input aria-label="Log date range" value="2026-05-09 00:00 ~ 2026-05-09 12:47">
      <button id="search-button">Search</button>
    </div>

    <div class="compact-grid" id="usage-filter-grid">
      <label>Start Time <input id="log-start" aria-label="Start Time" value="2026-05-09 12:00 AM"></label>
      <label>End Time <input id="log-end" aria-label="End Time" value="2026-05-09 12:47 PM"></label>
      <input aria-label="Model Name" placeholder="Model Name">
      <input aria-label="Group" placeholder="Group">
      <select aria-label="All Types"><option>All Types</option></select>
    </div>

    <section>
      <h2>Wallet</h2>
      <div class="row">
        <div><input id="redeem-code" placeholder="Redemption Code"></div>
        <button>Redeem</button>
      </div>
    </section>

    <table id="api-table">
      <thead>
        <tr>
          <th>Group</th>
          <th>Model</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>2x</td><td>B</td></tr>
        <tr><td>1x</td><td>A</td></tr>
      </tbody>
    </table>
  </main>

  <script>
    window.__fixture = {
      searchClicks: 0,
      reloads: 0
    };

    document.getElementById('search-button').addEventListener('click', () => {
      window.__fixture.searchClicks += 1;
    });

    window.location.reload = () => {
      window.__fixture.reloads += 1;
    };

  </script>
</body>
</html>
