<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LinkAPI Reduced Scope Smoke Fixture</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #f4f4f5;
      font: 14px/1.4 system-ui, sans-serif;
    }

    aside {
      position: fixed;
      inset: 0 auto 0 0;
      width: 72px;
      background: #050505;
    }

    header {
      position: sticky;
      top: 0;
      height: 48px;
      margin-left: 72px;
      background: #050505;
    }

    header nav {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 100%;
    }

    header a {
      color: #f4f4f5;
      text-decoration: none;
    }

    #account-shell {
      position: fixed;
      top: 56px;
      right: 16px;
      width: 220px;
      z-index: 20;
    }

    #account-trigger {
      position: absolute;
      top: -44px;
      right: 0;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: #4c1d95;
      color: #fff;
      font-weight: 700;
      padding: 0;
    }

    #account-menu {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 8px 0;
      border: 1px solid #3f3f46;
      border-radius: 10px;
      background: #171717;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
    }

    #account-menu [role="menuitem"],
    #account-menu [role="menuitemcheckbox"] {
      display: flex;
      align-items: center;
      min-height: 38px;
      border: 0;
      background: transparent;
      color: inherit;
      padding: 8px 14px;
      text-align: left;
      cursor: pointer;
    }

    #account-menu [role="separator"] {
      height: 1px;
      margin: 6px 0;
      background: #3f3f46;
    }

    main {
      padding: 24px 24px 96px 96px;
    }

    .row,
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin: 12px 0;
    }

    input,
    button,
    select {
      min-height: 30px;
      border: 1px solid #52525b;
      border-radius: 6px;
      background: #27272a;
      color: #fafafa;
      padding: 0 10px;
    }

    table {
      border-collapse: collapse;
      margin-top: 16px;
      min-width: 520px;
    }

    th,
    td {
      border: 1px solid #3f3f46;
      padding: 8px 12px;
      text-align: left;
    }

    #bottom-action {
      position: fixed;
      left: 88px;
      bottom: 16px;
    }
  </style>
</head>
<body>
  <aside aria-label="Primary navigation">
    <a href="/console">Console</a>
  </aside>
  <header>
    <nav aria-label="Top navigation">
      <a href="/">Home</a>
      <a href="/console">Console</a>
      <a href="/models">Model Square</a>
    </nav>
  </header>
  <div id="account-shell">
    <button id="account-trigger" type="button" aria-haspopup="menu" aria-expanded="true" aria-label="Open account menu">T</button>
    <div id="account-menu" role="menu" aria-label="Account menu" data-state="open">
      <button id="profile-item" type="button" role="menuitem">Profile</button>
      <button id="wallet-item" type="button" role="menuitem">Wallet</button>
      <div id="account-divider" role="separator" aria-orientation="horizontal"></div>
      <button id="sign-out-item" type="button" role="menuitem">Sign out</button>
    </div>
  </div>
  <main>
    <h1>钱包</h1>
    <p id="balance">当前余额: CNY 100.00</p>
    <p id="cost">Cost: 0.0123 CNY</p>
    <p id="split-cost">Split Cost: <span id="split-cost-pill"><span>¥</span><span>0.290984</span></span></p>
    <p id="yuan">充值金额 12 元</p>
    <p id="unit">Price (CNY)</p>
    <p id="copyright">© 2025 LinkAPI</p>
    <p id="announcement">亲爱的用户，请先Refresh后再查询。</p>

    <div class="actions">
      <label>Model Filter <input id="model-filter" value="gpt-5.5"></label>
      <label>API Key <input id="api-key" value="sk-sensitive-1234567890abcdef"></label>
      <label>Prompt <textarea id="prompt-field">private prompt content</textarea></label>
      <select id="status-filter" aria-label="Status Filter">
        <option>All</option>
        <option>Active</option>
      </select>
    </div>

    <section>
      <h2>Wallet</h2>
      <div class="row">
        <div><input id="redeem-code" placeholder="Redemption Code"></div>
        <button id="redeem-button">Redeem</button>
      </div>
    </section>

    <table id="api-table">
      <thead>
        <tr>
          <th>Group</th>
          <th>Model</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>2x</td><td>B</td></tr>
        <tr><td>1x</td><td>A</td></tr>
      </tbody>
    </table>

    <div id="dynamic-root"></div>
    <button id="bottom-action">Native Action</button>
  </main>
</body>
</html>
